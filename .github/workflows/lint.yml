name: Lint

on:
  push:

jobs:
  flake8-lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7
      - name: Set up Python environment
        uses: astral-sh/ruff-action@v4.0.0
        with:
          src: "./src"
      - name: Ruff check
        run: ruff check -v